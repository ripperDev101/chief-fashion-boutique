services:
  - type: web
    runtime: static
    name: chief-fashion-boutique
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      # SPA fallback so React Router paths (/shop, /terms, ...) resolve
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_PROJECT_ID
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_OZOW_SITE_CODE
        sync: false
      - key: VITE_OZOW_SECRET_KEY
        sync: false
      - key: VITE_OZOW_IS_TEST
        sync: false
      - key: VITE_OZOW_TEST_AMOUNT
        sync: false
